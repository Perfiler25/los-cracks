<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Oro - $10,000</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* El secreto del oro: Un gradiente metálico perfecto */
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            font-family: 'Georgia', serif;
            text-align: center;
            color: #332200;
            overflow: hidden;
        }
        .tarjeta-vip {
            background: rgba(255, 255, 255, 0.15);
            padding: 60px 90px;
            border-radius: 25px;
            border: 2px solid #FFF8DC;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 4.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3), -1px -1px 0 rgba(255,255,255,0.5);
        }
        p {
            font-size: 1.8rem;
            font-style: italic;
            margin-top: 15px;
            letter-spacing: 2px;
        }
        .etiqueta-precio {
            margin-top: 40px;
            font-size: 3rem;
            font-weight: bold;
            background: #2b1d00;
            color: #FCF6BA;
            padding: 15px 40px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border: 2px solid #AA771C;
        }
    </style>
</head>
<body>
    <div class="tarjeta-vip">
        <h1>Oro Puro</h1>
        <p>La experiencia digital más exclusiva de la red.</p>
        <div class="etiqueta-precio">$10,000 USD</div>
    </div>
</body>
</html>
